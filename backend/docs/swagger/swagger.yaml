basePath: /api/v1
definitions:
  handler.AssetDistributionResponse:
    properties:
      source_dist:
        items:
          $ref: '#/definitions/handler.DistItem'
        type: array
      status_dist:
        items:
          $ref: '#/definitions/handler.DistItem'
        type: array
      top_services:
        items:
          $ref: '#/definitions/handler.TopItem'
        type: array
    type: object
  handler.AssignTicketRequest:
    properties:
      assignee_id:
        example: 3
        type: integer
    required:
    - assignee_id
    type: object
  handler.ChangePasswordRequest:
    properties:
      new_password:
        example: NewPass456
        maxLength: 50
        minLength: 6
        type: string
      old_password:
        example: OldPass123
        type: string
    required:
    - new_password
    - old_password
    type: object
  handler.CloseTicketRequest:
    properties:
      note:
        example: 清理了日志文件
        type: string
      resolution:
        description: fixed/wontfix/duplicate/invalid/workaround
        example: fixed
        type: string
    required:
    - resolution
    type: object
  handler.CommentRequest:
    properties:
      content:
        example: 已定位问题
        type: string
    required:
    - content
    type: object
  handler.CreateAssetRequest:
    properties:
      asset_type:
        enum:
        - server
        - network
        example: server
        type: string
      cpu_cores:
        example: 4
        type: integer
      disk_gb:
        example: 200
        type: integer
      hostname:
        example: web-server-01
        type: string
      idc:
        example: 杭州
        type: string
      inner_ip:
        example: 192.168.1.1
        type: string
      ip:
        example: 10.0.1.1
        type: string
      memory_mb:
        example: 8192
        type: integer
      os:
        example: CentOS
        type: string
      os_version:
        example: "7.9"
        type: string
      owner_ids:
        example: '[1,5]'
        type: string
      remark:
        example: Web 前端服务器
        type: string
      service_tree_id:
        example: 1
        type: integer
      sn:
        example: SN12345
        type: string
      status:
        enum:
        - online
        - offline
        example: online
        type: string
      tags:
        example: '["production","web"]'
        type: string
    required:
    - hostname
    - ip
    type: object
  handler.CreateCloudAccountRequest:
    properties:
      access_key:
        example: LTAI5t...
        type: string
      name:
        example: 阿里云生产环境
        type: string
      owner_ids:
        example: '[1,5]'
        type: string
      provider:
        enum:
        - aliyun
        - tencent
        - aws
        example: aliyun
        type: string
      region:
        example: cn-hangzhou,cn-beijing
        type: string
      secret_key:
        example: xxxxxxxx
        type: string
      service_tree_id:
        example: 1
        type: integer
    required:
    - access_key
    - name
    - provider
    - secret_key
    type: object
  handler.CreateDepartmentRequest:
    properties:
      code:
        example: ops
        type: string
      description:
        example: 负责基础设施运维
        type: string
      manager_id:
        example: 1
        type: integer
      name:
        example: 运维部
        type: string
      sort:
        example: 1
        type: integer
    required:
    - name
    type: object
  handler.CreateMenuRequest:
    properties:
      api_method:
        example: GET
        type: string
      api_path:
        example: /api/v1/users
        type: string
      component:
        example: Layout
        type: string
      icon:
        example: setting
        type: string
      name:
        example: system
        type: string
      parent_id:
        example: 0
        type: integer
      path:
        example: /system
        type: string
      sort:
        example: 1
        type: integer
      title:
        example: 系统管理
        type: string
      type:
        description: 1:目录 2:菜单 3:按钮/权限
        enum:
        - 1
        - 2
        - 3
        example: 1
        type: integer
      visible:
        description: 0:隐藏 1:显示
        enum:
        - 0
        - 1
        example: 1
        type: integer
    required:
    - name
    - title
    - type
    type: object
  handler.CreateRoleRequest:
    properties:
      description:
        example: 内容编辑角色
        type: string
      display_name:
        example: 编辑员
        type: string
      name:
        example: editor
        maxLength: 50
        minLength: 2
        type: string
      sort:
        example: 1
        type: integer
    required:
    - display_name
    - name
    type: object
  handler.CreateServiceTreeRequest:
    properties:
      code:
        example: infra
        type: string
      description:
        example: 基础架构部
        type: string
      name:
        example: 基础架构
        type: string
      owner_id:
        example: 1
        type: integer
      parent_id:
        example: 0
        type: integer
      sort:
        example: 1
        type: integer
    required:
    - name
    type: object
  handler.CreateTaskRequest:
    properties:
      description:
        example: 清理临时文件
        type: string
      name:
        example: 磁盘清理脚本
        type: string
      run_as_user:
        example: root
        type: string
      script_content:
        example: df -h
        type: string
      script_type:
        example: bash
        type: string
      task_type:
        example: shell
        type: string
      timeout:
        example: 60
        type: integer
    required:
    - name
    type: object
  handler.CreateTicketRequest:
    properties:
      assignee_id:
        type: integer
      description:
        example: 磁盘使用率超过90%
        type: string
      extra_fields:
        additionalProperties: true
        type: object
      handle_dept_id:
        type: integer
      priority:
        example: high
        type: string
      request_template_id:
        type: integer
      resource_id:
        example: 1
        type: integer
      resource_ids:
        items:
          type: integer
        type: array
      resource_type:
        example: asset
        type: string
      ticket_kind:
        type: string
      title:
        example: 服务器磁盘告警
        type: string
      type_id:
        example: 1
        type: integer
    required:
    - title
    - type_id
    type: object
  handler.CreateTicketTypeRequest:
    properties:
      auto_assign_rule:
        example: resource_owner
        type: string
      code:
        example: incident
        type: string
      default_assignee:
        type: integer
      description:
        type: string
      handle_dept_id:
        type: integer
      icon:
        example: Warning
        type: string
      name:
        example: 故障报修
        type: string
      priority:
        example: medium
        type: string
      sort:
        type: integer
    required:
    - name
    type: object
  handler.DistItem:
    properties:
      count:
        type: integer
      label:
        type: string
    type: object
  handler.ExecuteTaskRequest:
    properties:
      host_ips:
        example:
        - 10.0.0.1
        - 10.0.0.2
        items:
          type: string
        type: array
    required:
    - host_ips
    type: object
  handler.LoginRequest:
    properties:
      password:
        example: Admin123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  handler.MoveServiceTreeRequest:
    properties:
      parent_id:
        example: 0
        type: integer
    type: object
  handler.ProcessTicketRequest:
    properties:
      action:
        description: resolve/reject
        example: resolve
        type: string
      content:
        example: 已处理完成
        type: string
    required:
    - action
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: Pass123456
        maxLength: 50
        minLength: 6
        type: string
      username:
        example: johndoe
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  handler.SetDepartmentRequest:
    properties:
      department_id:
        example: 1
        type: integer
    type: object
  handler.SetMenusRequest:
    properties:
      menu_ids:
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
    type: object
  handler.SetUserRolesRequest:
    properties:
      role_ids:
        example:
        - 1
        - 2
        items:
          type: integer
        type: array
    type: object
  handler.SummaryResponse:
    properties:
      asset_offline:
        type: integer
      asset_online:
        type: integer
      asset_total:
        type: integer
      cloud_account_failed:
        description: last_sync_status=failed
        type: integer
      cloud_account_total:
        type: integer
      department_total:
        type: integer
      service_tree_total:
        type: integer
      ticket_open:
        type: integer
      ticket_total:
        type: integer
      user_total:
        type: integer
    type: object
  handler.TopItem:
    properties:
      count:
        type: integer
      id:
        type: integer
      name:
        type: string
    type: object
  handler.TransferTicketRequest:
    properties:
      assignee_id:
        example: 5
        type: integer
      content:
        example: 转交给更熟悉的同事
        type: string
    required:
    - assignee_id
    type: object
  handler.UpdateCloudAccountKeysRequest:
    properties:
      access_key:
        example: LTAI5t...
        type: string
      secret_key:
        example: xxxxxxxx
        type: string
    required:
    - access_key
    - secret_key
    type: object
  handler.UpdateCloudAccountRequest:
    properties:
      name:
        example: 阿里云生产环境
        type: string
      owner_ids:
        example: '[1,5]'
        type: string
      region:
        example: cn-hangzhou,cn-beijing
        type: string
      service_tree_id:
        example: 1
        type: integer
      status:
        enum:
        - 0
        - 1
        example: 1
        type: integer
    required:
    - name
    type: object
  handler.UpdateRoleRequest:
    properties:
      description:
        example: 内容编辑角色
        type: string
      display_name:
        example: 编辑员
        type: string
      sort:
        example: 1
        type: integer
    required:
    - display_name
    type: object
  handler.UpdateRoleStatusRequest:
    properties:
      status:
        description: 0:禁用 1:启用
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
  handler.UpdateServiceTreeRequest:
    properties:
      code:
        example: infra
        type: string
      description:
        example: 基础架构部
        type: string
      name:
        example: 基础架构
        type: string
      owner_id:
        example: 1
        type: integer
      sort:
        example: 1
        type: integer
    required:
    - name
    type: object
  handler.UpdateSyncConfigRequest:
    properties:
      sync_enabled:
        type: boolean
      sync_interval:
        description: '分钟: 0/10/30/60/1440'
        example: 30
        type: integer
    type: object
  handler.UpdateTaskRequest:
    properties:
      description:
        example: 清理临时文件
        type: string
      name:
        example: 磁盘清理脚本
        type: string
      run_as_user:
        example: root
        type: string
      script_content:
        example: df -h
        type: string
      script_type:
        example: bash
        type: string
      task_type:
        example: shell
        type: string
      timeout:
        example: 60
        type: integer
    type: object
  handler.UpdateUserRequest:
    properties:
      department_id:
        example: 1
        type: integer
      email:
        example: test@example.com
        type: string
      phone:
        example: "13800138000"
        type: string
      real_name:
        example: 张三
        type: string
    type: object
  handler.UpdateUserStatusRequest:
    properties:
      status:
        description: 0:禁用 1:启用
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
  model.AgentInfo:
    properties:
      agent_id:
        type: string
      cpu_count:
        type: integer
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      hostname:
        type: string
      id:
        type: integer
      ip:
        type: string
      labels:
        type: string
      last_heartbeat:
        example: "2024-01-01 00:00:00"
        type: string
      memory_total:
        type: integer
      os:
        type: string
      status:
        description: online/offline
        type: string
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
      version:
        type: string
    type: object
  model.Asset:
    properties:
      asset_type:
        description: server/network
        type: string
      cloud_account_id:
        type: integer
      cloud_instance_id:
        description: 云实例ID，用于同步 upsert
        type: string
      cpu_cores:
        type: integer
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      disk_gb:
        type: integer
      expired_at:
        description: 到期时间（云实例）
        example: "2024-01-01 00:00:00"
        type: string
      hostname:
        type: string
      id:
        type: integer
      idc:
        type: string
      inner_ip:
        type: string
      ip:
        type: string
      last_seen_at:
        description: 最后在云端被发现的时间
        example: "2024-01-01 00:00:00"
        type: string
      last_sync_at:
        description: 最后同步时间
        example: "2024-01-01 00:00:00"
        type: string
      memory_mb:
        type: integer
      offline_at:
        description: 标记离线的时间
        example: "2024-01-01 00:00:00"
        type: string
      os:
        type: string
      os_version:
        type: string
      owner_ids:
        description: 负责人ID列表 JSON [1,5]
        type: string
      owner_names:
        description: 关联查询
        items:
          type: string
        type: array
      remark:
        type: string
      service_tree_id:
        type: integer
      service_tree_name:
        description: 关联查询，不入库
        type: string
      service_tree_path:
        description: 完整路径，如 "阿里云 / 北京 / xxx"
        type: string
      sn:
        type: string
      source:
        description: manual/aliyun/tencent/aws
        type: string
      status:
        description: online/offline
        type: string
      tags:
        description: JSON 数组 ["tag1","tag2"]
        type: string
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  model.AssetChange:
    properties:
      asset_id:
        type: integer
      change_type:
        description: create/update/sync/delete
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      field:
        type: string
      id:
        type: integer
      new_value:
        type: string
      old_value:
        type: string
      operator_id:
        type: integer
      operator_name:
        type: string
    type: object
  model.AuditLog:
    properties:
      action:
        description: create/update/delete/login/logout
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      detail:
        type: string
      id:
        type: integer
      ip:
        type: string
      resource:
        description: user/role/menu
        type: string
      resource_id:
        type: integer
      status_code:
        type: integer
      user_id:
        type: integer
      username:
        type: string
    type: object
  model.CloudAccount:
    properties:
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      id:
        type: integer
      last_sync_at:
        example: "2024-01-01 00:00:00"
        type: string
      last_sync_message:
        type: string
      last_sync_status:
        description: success/failed/syncing
        type: string
      name:
        type: string
      owner_ids:
        description: 负责人ID列表 JSON [1,5]
        type: string
      owner_names:
        description: 关联查询
        items:
          type: string
        type: array
      provider:
        description: aliyun/tencent/aws
        type: string
      region:
        description: 逗号分隔的地域列表
        type: string
      service_tree_id:
        description: 关联服务树节点
        type: integer
      status:
        description: 1=启用 0=禁用
        type: integer
      sync_enabled:
        description: 是否启用定时同步
        type: boolean
      sync_interval:
        description: 同步周期（分钟），0=不同步，10/30/60/1440
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  model.CloudSyncTask:
    properties:
      account_name:
        description: 冗余，方便查询展示
        type: string
      cloud_account_id:
        type: integer
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      created_count:
        description: 新增数
        type: integer
      duration_ms:
        description: 耗时毫秒
        type: integer
      error_message:
        description: 失败原因
        type: string
      finished_at:
        example: "2024-01-01 00:00:00"
        type: string
      id:
        type: integer
      offline_count:
        description: 下线数（云端消失）
        type: integer
      operator_id:
        description: 手动触发时的操作人
        type: integer
      operator_name:
        description: 操作人用户名
        type: string
      provider:
        description: aliyun/tencent/aws
        type: string
      regions:
        description: 本次同步的 region 列表
        type: string
      started_at:
        example: "2024-01-01 00:00:00"
        type: string
      status:
        description: running / success / failed
        type: string
      total_count:
        description: 云端返回的实例总数
        type: integer
      trigger_type:
        description: manual / schedule
        type: string
      unchanged_count:
        description: 无变化数
        type: integer
      updated_count:
        description: 更新数
        type: integer
    type: object
  model.Department:
    properties:
      code:
        description: 部门编码，如 dev/ops/qa
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      description:
        type: string
      id:
        type: integer
      manager_id:
        description: 部门负责人 user_id
        type: integer
      manager_name:
        description: 关联查询，不入库
        type: string
      name:
        type: string
      sort:
        type: integer
      status:
        description: 1=启用 0=禁用
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
      user_count:
        description: 关联统计，不入库
        type: integer
    type: object
  model.Menu:
    properties:
      api_method:
        type: string
      api_path:
        type: string
      children:
        items:
          $ref: '#/definitions/model.Menu'
        type: array
      component:
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      path:
        type: string
      sort:
        type: integer
      status:
        type: integer
      title:
        type: string
      type:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
      visible:
        type: integer
    type: object
  model.Role:
    properties:
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      description:
        type: string
      display_name:
        type: string
      id:
        type: integer
      menus:
        items:
          $ref: '#/definitions/model.Menu'
        type: array
      name:
        type: string
      sort:
        type: integer
      status:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  model.ServiceTree:
    properties:
      children:
        items:
          $ref: '#/definitions/model.ServiceTree'
        type: array
      code:
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      description:
        type: string
      id:
        type: integer
      level:
        description: 1=业务线 2=产品 3=模块（不硬限制，支持N层）
        type: integer
      name:
        type: string
      owner_id:
        type: integer
      parent_id:
        type: integer
      sort:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  model.Task:
    properties:
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      creator_id:
        type: integer
      creator_name:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      run_as_user:
        type: string
      script_content:
        type: string
      script_type:
        description: bash/python/powershell
        type: string
      status:
        description: 1=enabled, 0=disabled
        type: integer
      task_type:
        description: shell/python/file_transfer
        type: string
      timeout:
        description: seconds
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  model.TaskExecution:
    properties:
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      fail_count:
        type: integer
      finished_at:
        example: "2024-01-01 00:00:00"
        type: string
      host_results:
        description: 关联加载
        items:
          $ref: '#/definitions/model.TaskHostResult'
        type: array
      id:
        type: integer
      operator_id:
        type: integer
      operator_name:
        type: string
      started_at:
        example: "2024-01-01 00:00:00"
        type: string
      status:
        description: pending/running/success/partial_fail/failed/canceled
        type: string
      success_count:
        type: integer
      target_hosts:
        description: '["1.2.3.4","5.6.7.8"]'
        type: string
      task_id:
        type: integer
      task_name:
        type: string
      total_count:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  model.TaskHostResult:
    properties:
      agent_id:
        type: string

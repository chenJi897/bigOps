      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误/原密码错误/密码复杂度不够
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 修改当前用户密码
      tags:
      - 认证
  /auth/register:
    post:
      consumes:
      - application/json
      description: 注册新用户账号，密码需包含大小写字母和数字，长度 8-50 位

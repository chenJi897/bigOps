host: localhost:8080
info:
  contact: {}
  description: BigOps 运维平台 API 文档
  title: BigOps API
  version: "1.0"
paths:
  /agents:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      - description: 状态
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.AgentInfo'
                        type: array
                    type: object
              type: object
      security:
      - BearerAuth: []
      summary: Agent 列表
      tags:
      - 任务管理
  /assets:
    get:
      description: 分页获取主机资产列表，支持多条件筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      - description: 状态
        enum:
        - online
        - offline
        in: query
        name: status
        type: string
      - description: 服务树节点ID
        in: query
        name: service_tree_id
        type: integer
      - default: false
        description: 是否递归查子节点
        in: query
        name: recursive
        type: boolean
      - description: 来源
        enum:
        - manual
        - aliyun
        - tencent
        - aws
        in: query
        name: source
        type: string
      - description: 搜索关键字（主机名/IP）
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 资产列表
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Asset'
                        type: array
                    type: object
              type: object
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 资产列表
      tags:
      - 资产管理
    post:
      consumes:
      - application/json
      description: 手动创建主机资产
      parameters:
      - description: 创建请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误/主机名已存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 创建资产
      tags:
      - 资产管理
  /assets/{id}:
    get:
      description: 获取主机资产详情
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 资产详情
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Asset'
              type: object
        "404":
          description: 资产不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 资产详情
      tags:
      - 资产管理
    post:
      consumes:
      - application/json
      description: 更新主机资产信息
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新资产
      tags:
      - 资产管理
  /assets/{id}/changes:
    get:
      description: 获取指定资产的变更历史记录
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 变更历史
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.AssetChange'
                        type: array
                    type: object
              type: object
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 资产变更历史
      tags:
      - 资产管理
  /assets/{id}/delete:
    post:
      description: 软删除主机资产
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 删除失败
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 删除资产
      tags:
      - 资产管理
  /audit-logs:
    get:
      description: 分页获取操作审计日志，支持按用户名、操作类型、资源类型过滤
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 操作类型(create/update/delete/login/logout)
        in: query
        name: action
        type: string
      - description: 资源类型(user/role/menu)
        in: query
        name: resource
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 审计日志列表
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.AuditLog'
                        type: array
                    type: object
              type: object
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 审计日志列表
      tags:
      - 审计日志
  /auth/info:
    get:
      description: 根据 token 获取当前登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取当前登录用户信息
      tags:
      - 认证
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录，返回 JWT token 和用户信息
      parameters:
      - description: 登录请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.LoginResult'
              type: object
        "401":
          description: 用户名或密码错误/账号已被禁用
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登录
      tags:
      - 认证
  /auth/logout:
    post:
      description: 使当前 token 失效，加入 Redis 黑名单
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: token 格式错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证
  /auth/password:
    post:
      consumes:
      - application/json
      description: 验证旧密码后修改为新密码，新密码需包含大小写字母和数字，长度 8-50 位
      parameters:
      - description: 修改密码请求
        in: body
        name: body
        required: true
        schema:

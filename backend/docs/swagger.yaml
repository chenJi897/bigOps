basePath: /api/v1
definitions:
  github_com_bigops_platform_internal_model.Asset:
    properties:
      asset_type:
        description: server/network
        type: string
      cloud_account_id:
        type: integer
      cloud_instance_id:
        description: 云实例ID，用于同步 upsert
        type: string
      cpu_cores:
        type: integer
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      disk_gb:
        type: integer
      hostname:
        type: string
      id:
        type: integer
      idc:
        type: string
      inner_ip:
        type: string
      ip:
        type: string
      memory_mb:
        type: integer
      os:
        type: string
      os_version:
        type: string
      remark:
        type: string
      service_tree_id:
        type: integer
      service_tree_name:
        description: 关联查询，不入库
        type: string
      sn:
        type: string
      source:
        description: manual/aliyun/tencent/aws
        type: string
      status:
        description: online/offline
        type: string
      tags:
        description: JSON 数组 ["tag1","tag2"]
        type: string
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  github_com_bigops_platform_internal_model.AssetChange:
    properties:
      asset_id:
        type: integer
      change_type:
        description: create/update/sync/delete
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      field:
        type: string
      id:
        type: integer
      new_value:
        type: string
      old_value:
        type: string
      operator_id:
        type: integer
      operator_name:
        type: string
    type: object
  github_com_bigops_platform_internal_model.AuditLog:
    properties:
      action:
        description: create/update/delete/login/logout
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      detail:
        type: string
      id:
        type: integer
      ip:
        type: string
      resource:
        description: user/role/menu
        type: string
      resource_id:
        type: integer
      status_code:
        type: integer
      user_id:
        type: integer
      username:
        type: string
    type: object
  github_com_bigops_platform_internal_model.CloudAccount:
    properties:
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      id:
        type: integer
      last_sync_at:
        example: "2024-01-01 00:00:00"
        type: string
      last_sync_message:
        type: string
      last_sync_status:
        description: success/failed/syncing
        type: string
      name:
        type: string
      provider:
        description: aliyun/tencent/aws
        type: string
      region:
        description: 逗号分隔的地域列表
        type: string
      status:
        description: 1=启用 0=禁用
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  github_com_bigops_platform_internal_model.Menu:
    properties:
      api_method:
        type: string
      api_path:
        type: string
      children:
        items:
          $ref: '#/definitions/github_com_bigops_platform_internal_model.Menu'
        type: array
      component:
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      path:
        type: string
      sort:
        type: integer
      status:
        type: integer
      title:
        type: string
      type:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
      visible:
        type: integer
    type: object
  github_com_bigops_platform_internal_model.Role:
    properties:
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      description:
        type: string
      display_name:
        type: string
      id:
        type: integer
      menus:
        items:
          $ref: '#/definitions/github_com_bigops_platform_internal_model.Menu'
        type: array
      name:
        type: string
      sort:
        type: integer
      status:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  github_com_bigops_platform_internal_model.ServiceTree:
    properties:
      children:
        items:
          $ref: '#/definitions/github_com_bigops_platform_internal_model.ServiceTree'
        type: array
      code:
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      description:
        type: string
      id:
        type: integer
      level:
        description: 1=业务线 2=产品 3=模块（不硬限制，支持N层）
        type: integer
      name:
        type: string
      owner_id:
        type: integer
      parent_id:
        type: integer
      sort:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
    type: object
  github_com_bigops_platform_internal_model.User:
    properties:
      avatar:
        type: string
      created_at:
        example: "2024-01-01 00:00:00"
        type: string
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
      real_name:
        type: string
      status:
        type: integer
      updated_at:
        example: "2024-01-01 00:00:00"
        type: string
      username:
        type: string
    type: object
  github_com_bigops_platform_internal_pkg_response.PageData:
    properties:
      list: {}
      page:
        description: 当前页码
        type: integer
      size:
        description: 每页条数
        type: integer
      total:
        description: 总记录数
        type: integer
    type: object
  github_com_bigops_platform_internal_pkg_response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  github_com_bigops_platform_internal_service.LoginResult:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/github_com_bigops_platform_internal_model.User'
    type: object
  internal_handler.ChangePasswordRequest:
    properties:
      new_password:
        example: NewPass456
        maxLength: 50
        minLength: 6
        type: string
      old_password:
        example: OldPass123
        type: string
    required:
    - new_password
    - old_password
    type: object
  internal_handler.CreateAssetRequest:
    properties:
      asset_type:
        enum:
        - server
        - network
        example: server
        type: string
      cpu_cores:
        example: 4
        type: integer
      disk_gb:
        example: 200
        type: integer
      hostname:
        example: web-server-01
        type: string
      idc:
        example: 杭州
        type: string
      inner_ip:
        example: 192.168.1.1
        type: string
      ip:
        example: 10.0.1.1
        type: string
      memory_mb:
        example: 8192
        type: integer
      os:
        example: CentOS
        type: string
      os_version:
        example: "7.9"
        type: string
      remark:
        example: Web 前端服务器
        type: string
      service_tree_id:
        example: 1
        type: integer
      sn:
        example: SN12345
        type: string
      status:
        enum:
        - online
        - offline
        example: online
        type: string
      tags:
        example: '["production","web"]'
        type: string
    required:
    - hostname
    - ip
    type: object
  internal_handler.CreateCloudAccountRequest:
    properties:
      access_key:
        example: LTAI5t...
        type: string
      name:
        example: 阿里云生产环境
        type: string
      provider:
        enum:
        - aliyun
        - tencent
        - aws
        example: aliyun
        type: string
      region:
        example: cn-hangzhou,cn-beijing
        type: string
      secret_key:
        example: xxxxxxxx
        type: string
    required:
    - access_key
    - name
    - provider
    - secret_key
    type: object
  internal_handler.CreateMenuRequest:
    properties:
      api_method:
        example: GET
        type: string
      api_path:
        example: /api/v1/users
        type: string
      component:
        example: Layout
        type: string
      icon:
        example: setting
        type: string
      name:
        example: system
        type: string
      parent_id:
        example: 0
        type: integer
      path:
        example: /system
        type: string
      sort:
        example: 1
        type: integer
      title:
        example: 系统管理
        type: string
      type:
        description: 1:目录 2:菜单 3:按钮/权限
        enum:
        - 1
        - 2
        - 3
        example: 1
        type: integer
      visible:
        description: 0:隐藏 1:显示
        enum:
        - 0
        - 1
        example: 1
        type: integer
    required:
    - name
    - title
    - type
    type: object
  internal_handler.CreateRoleRequest:
    properties:
      description:
        example: 内容编辑角色
        type: string
      display_name:
        example: 编辑员
        type: string
      name:
        example: editor
        maxLength: 50
        minLength: 2
        type: string
      sort:
        example: 1
        type: integer
    required:
    - display_name
    - name
    type: object
  internal_handler.CreateServiceTreeRequest:
    properties:
      code:
        example: infra
        type: string
      description:
        example: 基础架构部
        type: string
      name:
        example: 基础架构
        type: string
      owner_id:
        example: 1
        type: integer
      parent_id:
        example: 0
        type: integer
      sort:
        example: 1
        type: integer
    required:
    - name
    type: object
  internal_handler.LoginRequest:
    properties:
      password:
        example: Admin123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  internal_handler.MoveServiceTreeRequest:
    properties:
      parent_id:
        example: 0
        type: integer
    type: object
  internal_handler.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: Pass123456
        maxLength: 50
        minLength: 6
        type: string
      username:
        example: johndoe
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  internal_handler.SetMenusRequest:
    properties:
      menu_ids:
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
    type: object
  internal_handler.SetUserRolesRequest:
    properties:
      role_ids:
        example:
        - 1
        - 2
        items:
          type: integer
        type: array
    type: object
  internal_handler.UpdateCloudAccountKeysRequest:
    properties:
      access_key:
        example: LTAI5t...
        type: string
      secret_key:
        example: xxxxxxxx
        type: string
    required:
    - access_key
    - secret_key
    type: object
  internal_handler.UpdateCloudAccountRequest:
    properties:
      name:
        example: 阿里云生产环境
        type: string
      region:
        example: cn-hangzhou,cn-beijing
        type: string
      status:
        enum:
        - 0
        - 1
        example: 1
        type: integer
    required:
    - name
    type: object
  internal_handler.UpdateRoleRequest:
    properties:
      description:
        example: 内容编辑角色
        type: string
      display_name:
        example: 编辑员
        type: string
      sort:
        example: 1
        type: integer
    required:
    - display_name
    type: object
  internal_handler.UpdateRoleStatusRequest:
    properties:
      status:
        description: 0:禁用 1:启用
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
  internal_handler.UpdateServiceTreeRequest:
    properties:
      code:
        example: infra
        type: string
      description:
        example: 基础架构部
        type: string
      name:
        example: 基础架构
        type: string
      owner_id:
        example: 1
        type: integer
      sort:
        example: 1
        type: integer
    required:
    - name
    type: object
  internal_handler.UpdateUserStatusRequest:
    properties:
      status:
        description: 0:禁用 1:启用
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: BigOps 运维平台 API 文档
  title: BigOps API
  version: "1.0"
paths:
  /assets:
    get:
      description: 分页获取主机资产列表，支持多条件筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      - description: 状态
        enum:
        - online
        - offline
        in: query
        name: status
        type: string
      - description: 服务树节点ID
        in: query
        name: service_tree_id
        type: integer
      - description: 来源
        enum:
        - manual
        - aliyun
        - tencent
        - aws
        in: query
        name: source
        type: string
      - description: 搜索关键字（主机名/IP）
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 资产列表
          schema:
            allOf:
            - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/github_com_bigops_platform_internal_model.Asset'
                        type: array
                    type: object
              type: object
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 资产列表
      tags:
      - 资产管理
    post:
      consumes:
      - application/json
      description: 手动创建主机资产
      parameters:
      - description: 创建请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
        "400":
          description: 参数错误/主机名已存在
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 创建资产
      tags:
      - 资产管理
  /assets/{id}:
    get:
      description: 获取主机资产详情
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 资产详情
          schema:
            allOf:
            - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_bigops_platform_internal_model.Asset'
              type: object
        "404":
          description: 资产不存在
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 资产详情
      tags:
      - 资产管理
    post:
      consumes:
      - application/json
      description: 更新主机资产信息
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 更新资产
      tags:
      - 资产管理
  /assets/{id}/changes:
    get:
      description: 获取指定资产的变更历史记录
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 变更历史
          schema:
            allOf:
            - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/github_com_bigops_platform_internal_model.AssetChange'
                        type: array
                    type: object
              type: object
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 资产变更历史
      tags:
      - 资产管理
  /assets/{id}/delete:
    post:
      description: 软删除主机资产
      parameters:
      - description: 资产ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
        "400":
          description: 删除失败
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 删除资产
      tags:
      - 资产管理
  /audit-logs:
    get:
      description: 分页获取操作审计日志，支持按用户名、操作类型、资源类型过滤
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 操作类型(create/update/delete/login/logout)
        in: query
        name: action
        type: string
      - description: 资源类型(user/role/menu)
        in: query
        name: resource
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 审计日志列表
          schema:
            allOf:
            - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/github_com_bigops_platform_internal_model.AuditLog'
                        type: array
                    type: object
              type: object
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 审计日志列表
      tags:
      - 审计日志
  /auth/info:
    get:
      description: 根据 token 获取当前登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            allOf:
            - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_bigops_platform_internal_model.User'
              type: object
        "401":
          description: 用户未认证
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 获取当前登录用户信息
      tags:
      - 认证
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录，返回 JWT token 和用户信息
      parameters:
      - description: 登录请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_bigops_platform_internal_service.LoginResult'
              type: object
        "401":
          description: 用户名或密码错误/账号已被禁用
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      summary: 用户登录
      tags:
      - 认证
  /auth/logout:
    post:
      description: 使当前 token 失效，加入 Redis 黑名单
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
        "400":
          description: token 格式错误
          schema:
            $ref: '#/definitions/github_com_bigops_platform_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证
  /auth/password:
    post:
      consumes:
      - application/json
      description: 验证旧密码后修改为新密码，新密码需包含大小写字母和数字，长度 8-50 位
      parameters:
      - description: 修改密码请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
